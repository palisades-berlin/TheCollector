name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: |
          npm run lint
          npm run test:unit
          npm run test:coverage
          npm run test:security-policy
          npm run format:check

  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run integration suite
        run: npm run test:integration

  stability:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Validate Playwright browser (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install chromium

      - name: Run stability suite
        run: npm run test:stability

  performance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Validate Playwright browser (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install chromium

      - name: Run performance gate
        run: npm run test:performance

  e2e_smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Validate Playwright browser (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install chromium

      - name: Run e2e smoke
        run: npm run test:e2e:smoke

  visual_parity:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run UX/UI calibration gate (Figma contract + visual parity)
        run: npm run test:ui-calibration

  package:
    runs-on: ubuntu-latest
    needs: [quality, integration, stability, performance, e2e_smoke, visual_parity]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Package extension smoke test
        run: |
          ./scripts/package-release.sh
          ZIP_PATH="dist/the-collector-v$(node -p "require('./manifest.json').version").zip"
          test -f "$ZIP_PATH"
          if unzip -l "$ZIP_PATH" | grep -E "(tests/|node_modules/|\\.git/)"; then
            echo "Unexpected development artifacts found in release zip."
            exit 1
          fi

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: the-collector-release-zip
          path: dist/the-collector-v*.zip
          if-no-files-found: error
