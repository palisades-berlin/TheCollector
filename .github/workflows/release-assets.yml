name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  attach_extension_zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce manual smoke attestation in release notes
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          if ! printf '%s\n' "$RELEASE_BODY" | grep -Eiq '^manual-smoke:[[:space:]]*pass$'; then
            echo "Release attestation missing."
            echo "Add a release-note line exactly: manual-smoke: pass"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build release zip
        run: ./scripts/package-release.sh

      - name: Upload zip to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          TAG="v${VERSION}"
          ZIP_PATH="dist/the-collector-v${VERSION}.zip"
          gh release upload "$TAG" "$ZIP_PATH" --clobber --repo "${{ github.repository }}"
