version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - dependencies
      - security
    ignore:
      - dependency-name: '@playwright/test'
        update-types: ['version-update:semver-major']
      - dependency-name: 'playwright'
        update-types: ['version-update:semver-major']
